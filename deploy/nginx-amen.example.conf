# Exemple Nginx — Centre Médical AMEN
# Copier vers /etc/nginx/sites-available/amen et adapter le domaine.

server {
    listen 80;
    server_name amen.votredomaine.cd;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name amen.votredomaine.cd;

    # ssl_certificate /etc/letsencrypt/live/amen.votredomaine.cd/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/amen.votredomaine.cd/privkey.pem;

    root /var/www/amen/frontend/dist;
    index index.html;

    # Sécurité
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # SPA React — toutes les routes frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API Laravel — toutes les requêtes /api/* passent par index.php
    location ^~ /api {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/amen/backend-runtime/public/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
